<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornix Studio MCP — Dashboard</title>
<style>
  :root {
    --bg:       #0d0f14;
    --bg2:      #151820;
    --bg3:      #1c2030;
    --border:   #252a3a;
    --text:     #c8d0e8;
    --muted:    #5a6080;
    --accent:   #e05a00;
    --accent2:  #0066cc;
    --green:    #22cc66;
    --red:      #cc2222;
    --yellow:   #ccaa00;
    --purple:   #9966ff;
    --mono:     'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    --sans:     'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    min-height: 100vh;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: #fff;
  }
  .logo span { color: var(--accent); }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .pill-green  { background: #0d2a1a; color: var(--green);  border: 1px solid #1a5533; }
  .pill-red    { background: #2a0d0d; color: var(--red);    border: 1px solid #551a1a; }
  .pill-yellow { background: #2a2200; color: var(--yellow); border: 1px solid #554400; }

  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .dot-red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
  .dot-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

  .spacer { flex: 1; }

  #refresh-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--sans);
    transition: background 0.15s;
  }
  #refresh-btn:hover { background: var(--border); }

  .uptime { color: var(--muted); font-size: 12px; font-family: var(--mono); }

  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 53px);
  }

  /* ── Sidebar ──────────────────────────────────────────────────────────────── */
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    grid-row: 1 / 3;
    padding: 16px 0;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 16px 8px;
    margin-top: 8px;
  }

  .stat-block {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 700; color: #fff; font-family: var(--mono); }
  .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .family-list { padding: 0 8px; }
  .family-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .family-row:hover { background: var(--bg3); }
  .family-row.active { background: var(--bg3); border-left: 3px solid var(--accent); padding-left: 5px; }
  .family-name { font-size: 12px; color: var(--text); }
  .family-count {
    background: var(--bg3);
    color: var(--muted);
    font-size: 10px;
    font-family: var(--mono);
    padding: 1px 6px;
    border-radius: 999px;
  }

  /* ── Content area ─────────────────────────────────────────────────────────── */
  .content-top {
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    flex: 1;
    min-width: 160px;
  }
  .card-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
  .card-value { font-size: 24px; font-weight: 700; font-family: var(--mono); color: #fff; }
  .card-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .card.accent  { border-color: #e05a0044; background: #180f08; }
  .card.accent .card-value { color: var(--accent); }
  .card.bridge-ok   { border-color: #22cc6633; background: #081a10; }
  .card.bridge-ok .card-value { color: var(--green); }
  .card.bridge-off  { border-color: #cc222233; background: #1a0808; }
  .card.bridge-off .card-value { color: var(--red); }

  /* ── Log ──────────────────────────────────────────────────────────────────── */
  .log-area {
    overflow-y: auto;
    padding: 0 20px 20px;
  }

  .log-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0 8px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .log-header h2 { font-size: 13px; font-weight: 600; color: #fff; }

  .filter-row { display: flex; gap: 6px; }
  .filter-btn {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.1s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  tbody tr {
    border-bottom: 1px solid #ffffff08;
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--bg2); }
  tbody td {
    padding: 7px 8px;
    font-family: var(--mono);
    font-size: 11px;
    vertical-align: top;
  }

  .ok-yes { color: var(--green); }
  .ok-no  { color: var(--red);   }
  .dry    { color: var(--yellow); }

  .tool-tag {
    display: inline-block;
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    color: var(--muted);
  }

  .ts-cell { color: var(--muted); white-space: nowrap; }
  .summary-cell { color: var(--text); }
  .error-cell { color: var(--red); font-size: 10px; }

  /* ── Tools panel ──────────────────────────────────────────────────────────── */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    padding: 16px 20px;
  }

  .tool-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color 0.1s;
  }
  .tool-card:hover { border-color: var(--accent); }
  .tool-name { font-family: var(--mono); font-size: 11px; color: #fff; margin-bottom: 4px; }
  .tool-family { font-size: 10px; color: var(--muted); }
  .tool-rw {
    float: right;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--mono);
  }
  .tool-rw.ro { background: #1a3a22; color: var(--green); }
  .tool-rw.rw { background: #2a1a0a; color: var(--accent); }

  /* ── Workspace panel ──────────────────────────────────────────────────────── */
  .ws-panel { padding: 20px; }
  .dir-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .dir-row span { color: var(--muted); font-size: 11px; }

  .git-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 16px;
  }
  .git-block h3 { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .git-row { display: flex; gap: 10px; margin-bottom: 6px; font-size: 12px; }
  .git-key { color: var(--muted); width: 80px; flex-shrink: 0; }
  .git-val { font-family: var(--mono); color: var(--text); }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    padding: 0 20px;
  }
  .tab {
    padding: 10px 16px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: #fff; border-bottom-color: var(--accent); }

  #tab-content { overflow-y: auto; height: 100%; }

  .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    display: inline-block;
  }

  /* ── MCU Bridge panel ────────────────────────────────────────────────────── */
  .mcu-panel { padding: 16px 20px; }

  .mcu-transport {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .mcu-transport-btn {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--muted);
  }
  .mcu-transport-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .mcu-transport-btn.rec-active { background: var(--red); border-color: var(--red); color: #fff; }

  .mcu-timecode {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--green);
    background: #081a10;
    border: 1px solid #1a5533;
    border-radius: 6px;
    padding: 4px 12px;
    letter-spacing: 2px;
    margin-left: auto;
  }

  .mcu-lcd {
    background: #0a1420;
    border: 1px solid #1a3050;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    color: #88ccff;
    white-space: pre;
    overflow-x: auto;
  }
  .mcu-lcd .lcd-label { color: var(--muted); font-size: 10px; }

  .mcu-channels {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
  }

  .mcu-ch {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .mcu-ch-name {
    font-family: var(--mono);
    font-size: 11px;
    color: #fff;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-height: 16px;
  }

  .mcu-fader-track {
    width: 6px;
    height: 80px;
    background: var(--bg3);
    border-radius: 3px;
    position: relative;
    margin: 4px 0;
  }
  .mcu-fader-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: height 0.15s;
  }

  .mcu-vu-track {
    width: 100%;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }
  .mcu-vu-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.15s;
  }
  .mcu-vu-low { background: var(--green); }
  .mcu-vu-mid { background: var(--yellow); }
  .mcu-vu-high { background: var(--red); }

  .mcu-ch-btns { display: flex; gap: 3px; }
  .mcu-ch-btn {
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 3px;
    font-family: var(--mono);
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--muted);
  }
  .mcu-ch-btn.solo-on { background: #2a2200; color: var(--yellow); border-color: #554400; }
  .mcu-ch-btn.mute-on { background: #2a0d0d; color: var(--red); border-color: #551a1a; }
  .mcu-ch-btn.rec-on  { background: #2a0d0d; color: var(--red); border-color: #551a1a; }

  .mcu-fader-db {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .mcu-info-row {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .mcu-info-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
  }
  .mcu-info-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .mcu-info-value { font-family: var(--mono); color: var(--text); margin-top: 2px; }

  /* ── Song Watcher panel ──────────────────────────────────────────────────── */
  .watcher-panel { padding: 16px 20px; }

  .watcher-status-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .watcher-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    flex: 1;
    min-width: 160px;
  }
  .watcher-card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .watcher-card-value { font-family: var(--mono); font-size: 14px; color: #fff; margin-top: 4px; }

  .diff-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 12px;
  }
  .diff-block h3 { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .diff-item {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 0;
  }
  .diff-add { color: var(--green); }
  .diff-remove { color: var(--red); }
  .diff-change { color: var(--yellow); }
</style>
</head>
<body>

<header>
  <div class="logo">Fornix <span>Studio</span> MCP</div>
  <div id="bridge-pill" class="pill pill-yellow"><div class="dot dot-yellow"></div> Connecting…</div>
  <div class="uptime" id="uptime-label">—</div>
  <div class="spacer"></div>
  <span class="uptime" style="margin-right:8px"><span class="live-dot"></span> live</span>
  <button id="refresh-btn" onclick="fetchAll()">↻ Refresh</button>
</header>

<main>
  <aside>
    <div class="section-title">Overview</div>
    <div class="stat-block">
      <div class="stat-label">Tool calls this session</div>
      <div class="stat-value" id="stat-calls">—</div>
      <div class="stat-sub" id="stat-dirs">—</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">Git branch</div>
      <div class="stat-value" id="stat-branch" style="font-size:14px">—</div>
      <div class="stat-sub" id="stat-git-clean">—</div>
    </div>

    <div class="section-title" style="margin-top:12px">Tool Families</div>
    <div class="family-list" id="family-list"></div>
  </aside>

  <div style="display:flex;flex-direction:column;overflow:hidden;background:var(--bg)">
    <div class="content-top" id="cards"></div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="log">Action Log</div>
      <div class="tab" data-tab="mcu">MCU Bridge</div>
      <div class="tab" data-tab="watcher">Song Watcher</div>
      <div class="tab" data-tab="tools">All Tools</div>
      <div class="tab" data-tab="workspace">Workspace</div>
    </div>

    <div id="tab-content">
      <div id="pane-log"></div>
      <div id="pane-mcu" style="display:none"></div>
      <div id="pane-watcher" style="display:none"></div>
      <div id="pane-tools" style="display:none"></div>
      <div id="pane-workspace" style="display:none"></div>
    </div>
  </div>
</main>

<script>
const API = 'http://localhost:7891/api';
let status = null;
let logData = [];
let toolData = [];
let logFilter = 'all';
let activeFamily = null;

// ── Tabs ───────────────────────────────────────────────────────────────────────
const ALL_TABS = ['log','mcu','watcher','tools','workspace'];
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const name = tab.dataset.tab;
    ALL_TABS.forEach(p => {
      document.getElementById('pane-' + p).style.display = p === name ? '' : 'none';
    });
  });
});

// ── Fetch ──────────────────────────────────────────────────────────────────────
async function fetchAll() {
  try {
    const [s, l, t] = await Promise.all([
      fetch(API + '/status').then(r => r.json()),
      fetch(API + '/log?n=200').then(r => r.json()),
      fetch(API + '/tools').then(r => r.json()),
    ]);
    status = s; logData = l.entries; toolData = t.tools;
    render();
  } catch(e) {
    document.getElementById('bridge-pill').innerHTML = '<div class="dot dot-red"></div> MCP offline';
    document.getElementById('bridge-pill').className = 'pill pill-red';
  }
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  if (!status) return;
  renderHeader();
  renderCards();
  renderSidebar();
  renderLog();
  renderMcu();
  renderWatcher();
  renderTools();
  renderWorkspace();
}

function formatIso(value) {
  return value ? new Date(value).toLocaleString() : '—';
}

function renderHeader() {
  const phase = status.bridge.lifecyclePhase || status.bridge.connectionState || status.bridge.status;
  const bridge = status.bridge.connectionState || status.bridge.status;
  const pill = document.getElementById('bridge-pill');

  if (phase === 'runtime_verified') {
    pill.innerHTML = '<div class="dot dot-green"></div> S1 Runtime verified';
    pill.className = 'pill pill-green';
  } else if (phase === 'live_read_verified') {
    pill.innerHTML = '<div class="dot dot-green"></div> S1 Live read OK';
    pill.className = 'pill pill-green';
  } else if (bridge === 'ready' || phase === 'handshake_ok') {
    pill.innerHTML = '<div class="dot dot-green"></div> S1 Handshake OK';
    pill.className = 'pill pill-green';
  } else if (bridge === 'error') {
    pill.innerHTML = '<div class="dot dot-red"></div> Bridge Error';
    pill.className = 'pill pill-red';
  } else {
    const label = bridge === 'connected' ? 'Socket Only' : bridge;
    pill.innerHTML = `<div class="dot dot-yellow"></div> ${label}`;
    pill.className = 'pill pill-yellow';
  }

  const up = status.server.uptimeSeconds;
  const h = Math.floor(up / 3600), m = Math.floor((up % 3600) / 60), s = up % 60;
  document.getElementById('uptime-label').textContent =
    `Uptime ${h ? h+'h ' : ''}${m}m ${s}s`;
}

function renderCards() {
  const bridge = status.bridge.connectionState || status.bridge.status;
  const phase = status.bridge.lifecyclePhase || bridge;
  const handshakeOk = status.bridge.handshakeOk === true;
  const bridgeClass =
    phase === 'runtime_verified' || bridge === 'ready' || phase === 'handshake_ok'
      ? 'bridge-ok'
      : 'bridge-off';
  const bridgeLabel = phase === 'runtime_verified' ? 'live verified' : bridge === 'ready' ? 'Ready' : phase;
  const capabilityCount = Object.values(status.bridge.capabilities || {}).filter(Boolean).length;

  const mcu = status.mcuBridge || {};
  const mcuConnected = mcu.connected === true;
  const mcuClass = mcuConnected ? 'bridge-ok' : '';
  const mcuLabel = mcuConnected ? 'Connected' : 'Disconnected';
  const mcuSub = mcuConnected
    ? `${mcu.messageCount || 0} msgs · bank ${(mcu.bankOffset || 0) / 8 + 1}`
    : 'loopMIDI required';

  const watcher = status.songWatcher || {};
  const watcherActive = watcher.active === true;
  const watcherClass = watcherActive ? 'bridge-ok' : '';
  const watcherLabel = watcherActive ? 'Watching' : 'Inactive';
  const watcherSub = watcherActive
    ? `${watcher.snapshotCount || 0} snapshots`
    : 'Use s1_watch_session';

  document.getElementById('cards').innerHTML = `
    <div class="card accent">
      <div class="card-title">Tool Calls</div>
      <div class="card-value">${status.stats.toolCallsThisSession}</div>
      <div class="card-sub">this session</div>
    </div>
    <div class="card ${mcuClass}" style="cursor:pointer" onclick="switchTab('mcu')">
      <div class="card-title">MCU Bridge</div>
      <div class="card-value">${mcuLabel}</div>
      <div class="card-sub">${mcuSub}</div>
    </div>
    <div class="card ${watcherClass}" style="cursor:pointer" onclick="switchTab('watcher')">
      <div class="card-title">Song Watcher</div>
      <div class="card-value">${watcherLabel}</div>
      <div class="card-sub">${watcherSub}</div>
    </div>
    <div class="card">
      <div class="card-title">Tools Available</div>
      <div class="card-value">${toolData.length}</div>
      <div class="card-sub">across ${new Set(toolData.map(t=>t.family)).size} families</div>
    </div>
  `;
}

function renderSidebar() {
  const families = [...new Set(toolData.map(t => t.family))];
  const counts = {};
  toolData.forEach(t => counts[t.family] = (counts[t.family]||0)+1);

  document.getElementById('stat-calls').textContent = status.stats.toolCallsThisSession;
  document.getElementById('stat-dirs').textContent =
    `Bridge ${status.bridge.connectionState || status.bridge.status} • handshake ${status.bridge.handshakeOk ? 'ok' : 'pending'}`;
  document.getElementById('stat-branch').textContent = status.git?.branch ?? '—';
  document.getElementById('stat-git-clean').textContent = status.git
    ? (status.git.clean ? '✓ Working tree clean' : `${status.git.modified.length} modified`)
    : 'Git unavailable';

  document.getElementById('family-list').innerHTML = families.map(f => `
    <div class="family-row ${activeFamily===f?'active':''}" onclick="filterFamily('${f}')">
      <span class="family-name">${f}</span>
      <span class="family-count">${counts[f]}</span>
    </div>
  `).join('');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === name);
  });
  ALL_TABS.forEach(p => {
    document.getElementById('pane-' + p).style.display = p === name ? '' : 'none';
  });
}

function filterFamily(f) {
  activeFamily = activeFamily === f ? null : f;
  renderSidebar();
  renderTools();
  switchTab('tools');
}

function renderLog() {
  const filtered = logFilter === 'all' ? logData
    : logFilter === 'errors' ? logData.filter(e => !e.ok)
    : logFilter === 'writes' ? logData.filter(e => e.action !== 'read')
    : logData.filter(e => e.action === 'read');

  if (!filtered.length) {
    document.getElementById('pane-log').innerHTML = `
      <div class="log-header" style="padding:12px 20px">
        ${logFilterButtons()}
      </div>
      <div class="empty">No log entries yet. Use Claude to run tools and they'll appear here.</div>`;
    return;
  }

  const rows = filtered.map(e => {
    const ts = new Date(e.ts).toLocaleTimeString();
    const ok = e.ok ? '<span class="ok-yes">✓</span>' : '<span class="ok-no">✗</span>';
    const dry = e.dryRun ? ' <span class="dry">[dry]</span>' : '';
    return `<tr>
      <td class="ts-cell">${ts}</td>
      <td>${ok}${dry}</td>
      <td><span class="tool-tag">${e.tool}</span></td>
      <td class="summary-cell">${e.summary}${e.error ? `<br><span class="error-cell">${e.error}</span>` : ''}</td>
    </tr>`;
  }).join('');

  document.getElementById('pane-log').innerHTML = `
    <div class="log-header" style="padding:8px 20px">
      <h2>Action Log <span style="color:var(--muted);font-size:11px;font-weight:400">(${filtered.length} entries)</span></h2>
      ${logFilterButtons()}
    </div>
    <div style="padding:0 20px 20px">
    <table>
      <thead><tr><th>Time</th><th>OK</th><th>Tool</th><th>Summary</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  addFilterListeners();
}

function logFilterButtons() {
  return `<div class="filter-row">
    ${['all','errors','writes','reads'].map(f => `
      <button class="filter-btn ${logFilter===f?'active':''}" onclick="setLogFilter('${f}')">${f}</button>
    `).join('')}
  </div>`;
}

function addFilterListeners() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      logFilter = btn.textContent.trim().toLowerCase().replace(' ','');
      renderLog();
    });
  });
}

function setLogFilter(f) { logFilter = f; renderLog(); }

function renderTools() {
  const filtered = activeFamily ? toolData.filter(t => t.family === activeFamily) : toolData;
  document.getElementById('pane-tools').innerHTML = `
    <div class="tools-grid">
      ${filtered.map(t => `
        <div class="tool-card">
          <div>
            <span class="tool-rw ${t.readOnly?'ro':'rw'}">${t.readOnly?'read':'write'}</span>
          </div>
          <div class="tool-name">${t.name}</div>
          <div class="tool-family">${t.family}</div>
        </div>
      `).join('')}
    </div>`;
}

function faderToDb(normalized) {
  if (normalized <= 0) return '-inf';
  if (normalized >= 1) return '+6.0';
  const db = 20 * Math.log10(normalized) * 1.5 - 6;
  return db > 0 ? '+' + db.toFixed(1) : db.toFixed(1);
}

function renderMcu() {
  const mcu = status.mcuBridge || {};
  const channels = mcu.channels || [];
  const transport = mcu.transport || {};

  if (!mcu.connected) {
    document.getElementById('pane-mcu').innerHTML = `
      <div class="mcu-panel">
        <div class="mcu-info-row">
          <div class="mcu-info-item">
            <div class="mcu-info-label">Status</div>
            <div class="mcu-info-value" style="color:var(--red)">Disconnected</div>
          </div>
        </div>
        <div class="diff-block">
          <h3>Setup Required</h3>
          <div style="font-size:12px;color:var(--text);line-height:1.8">
            <div>1. Install <strong>loopMIDI</strong> (free virtual MIDI driver)</div>
            <div>2. Create a virtual port named <code style="color:var(--accent)">Fornix MCU</code></div>
            <div>3. In Studio One: Options → External Devices → Add → Mackie Control</div>
            <div>4. Set both Send To and Receive From to <code style="color:var(--accent)">Fornix MCU</code></div>
            <div>5. Use <code style="color:var(--accent)">mcu_connect</code> tool to connect</div>
          </div>
        </div>
      </div>`;
    return;
  }

  const transportBtns = [
    { key: 'rewinding', label: 'REW', cls: '' },
    { key: 'forwarding', label: 'FWD', cls: '' },
    { key: 'playing', label: 'PLAY', cls: '' },
    { key: 'recording', label: 'REC', cls: 'rec-' },
  ];

  const channelHtml = channels.map((ch, i) => {
    const faderPct = Math.round((ch.fader || 0) * 100);
    const vuPct = Math.round(((ch.vu || 0) / 12) * 100);
    const vuClass = ch.vu > 10 ? 'mcu-vu-high' : ch.vu > 7 ? 'mcu-vu-mid' : 'mcu-vu-low';
    return `<div class="mcu-ch">
      <div class="mcu-ch-name">${ch.name || '—'}</div>
      <div class="mcu-fader-track"><div class="mcu-fader-fill" style="height:${faderPct}%"></div></div>
      <div class="mcu-fader-db">${faderToDb(ch.fader || 0)}</div>
      <div class="mcu-vu-track"><div class="mcu-vu-fill ${vuClass}" style="width:${vuPct}%"></div></div>
      <div class="mcu-ch-btns">
        <span class="mcu-ch-btn ${ch.solo?'solo-on':''}">S</span>
        <span class="mcu-ch-btn ${ch.mute?'mute-on':''}">M</span>
        <span class="mcu-ch-btn ${ch.recArm?'rec-on':''}">R</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('pane-mcu').innerHTML = `
    <div class="mcu-panel">
      <div class="mcu-info-row">
        <div class="mcu-info-item">
          <div class="mcu-info-label">Input</div>
          <div class="mcu-info-value">${mcu.inputPort || '—'}</div>
        </div>
        <div class="mcu-info-item">
          <div class="mcu-info-label">Output</div>
          <div class="mcu-info-value">${mcu.outputPort || '—'}</div>
        </div>
        <div class="mcu-info-item">
          <div class="mcu-info-label">Messages</div>
          <div class="mcu-info-value">${mcu.messageCount || 0}</div>
        </div>
        <div class="mcu-info-item">
          <div class="mcu-info-label">Bank</div>
          <div class="mcu-info-value">Ch ${(mcu.bankOffset||0)+1}–${(mcu.bankOffset||0)+8}</div>
        </div>
        <div class="mcu-info-item">
          <div class="mcu-info-label">Last message</div>
          <div class="mcu-info-value">${mcu.lastMessageAt ? new Date(mcu.lastMessageAt).toLocaleTimeString() : '—'}</div>
        </div>
      </div>

      <div class="mcu-transport">
        ${transportBtns.map(b => `<div class="mcu-transport-btn ${transport[b.key] ? (b.cls + 'active') : ''}">${b.label}</div>`).join('')}
        <div class="mcu-timecode">${mcu.timecode || '00:00:00:00'}</div>
      </div>

      <div class="mcu-lcd">
        <span class="lcd-label">LCD Top: </span>${escHtml(mcu.lcdTop || '')}\n<span class="lcd-label">LCD Bot: </span>${escHtml(mcu.lcdBottom || '')}
      </div>

      <div class="section-title">Channel Strips</div>
      <div class="mcu-channels">${channelHtml}</div>
    </div>`;
}

function renderWatcher() {
  const watcher = status.songWatcher || {};

  if (!watcher.active) {
    document.getElementById('pane-watcher').innerHTML = `
      <div class="watcher-panel">
        <div class="watcher-status-row">
          <div class="watcher-card">
            <div class="watcher-card-label">Status</div>
            <div class="watcher-card-value" style="color:var(--muted)">Inactive</div>
          </div>
        </div>
        <div class="diff-block">
          <h3>Song Watcher</h3>
          <div style="font-size:12px;color:var(--text);line-height:1.8">
            <div>Monitors .song files for changes and provides session diffs.</div>
            <div style="margin-top:8px">Use <code style="color:var(--accent)">s1_watch_session</code> to start watching a song file or directory.</div>
            <div>Use <code style="color:var(--accent)">s1_session_snapshot</code> to see current state.</div>
            <div>Use <code style="color:var(--accent)">s1_session_diff</code> to see changes between saves.</div>
          </div>
        </div>
      </div>`;
    return;
  }

  const diff = watcher.lastDiff;
  let diffHtml = '<div style="color:var(--muted);font-size:12px">No changes detected yet. Save your song in S1 to see diffs.</div>';

  if (diff) {
    const items = [];
    if (diff.tracksAdded?.length)   diff.tracksAdded.forEach(t => items.push(`<div class="diff-item diff-add">+ Track: ${escHtml(t)}</div>`));
    if (diff.tracksRemoved?.length) diff.tracksRemoved.forEach(t => items.push(`<div class="diff-item diff-remove">- Track: ${escHtml(t)}</div>`));
    if (diff.tempoChanged)          items.push(`<div class="diff-item diff-change">~ Tempo: ${diff.tempoChanged.from} → ${diff.tempoChanged.to}</div>`);
    if (diff.timeSignatureChanged)  items.push(`<div class="diff-item diff-change">~ Time sig: ${diff.timeSignatureChanged.from} → ${diff.timeSignatureChanged.to}</div>`);
    if (diff.markersAdded?.length)   diff.markersAdded.forEach(m => items.push(`<div class="diff-item diff-add">+ Marker: ${escHtml(m)}</div>`));
    if (diff.markersRemoved?.length) diff.markersRemoved.forEach(m => items.push(`<div class="diff-item diff-remove">- Marker: ${escHtml(m)}</div>`));
    if (diff.markersMoved?.length)   diff.markersMoved.forEach(m => items.push(`<div class="diff-item diff-change">~ Marker "${escHtml(m.name)}": bar ${m.fromBar} → ${m.toBar}</div>`));
    if (items.length) {
      diffHtml = items.join('');
      if (diff.summary) diffHtml += `<div style="margin-top:8px;font-size:11px;color:var(--muted)">${escHtml(diff.summary)}</div>`;
    }
  }

  const songName = watcher.songFile ? watcher.songFile.split(/[/\\]/).pop() : '—';

  document.getElementById('pane-watcher').innerHTML = `
    <div class="watcher-panel">
      <div class="watcher-status-row">
        <div class="watcher-card">
          <div class="watcher-card-label">Status</div>
          <div class="watcher-card-value" style="color:var(--green)"><span class="live-dot"></span> Active</div>
        </div>
        <div class="watcher-card">
          <div class="watcher-card-label">Song File</div>
          <div class="watcher-card-value">${escHtml(songName)}</div>
        </div>
        <div class="watcher-card">
          <div class="watcher-card-label">Snapshots</div>
          <div class="watcher-card-value">${watcher.snapshotCount || 0}</div>
        </div>
        <div class="watcher-card">
          <div class="watcher-card-label">Last Parsed</div>
          <div class="watcher-card-value">${watcher.lastParsedAt ? new Date(watcher.lastParsedAt).toLocaleTimeString() : '—'}</div>
        </div>
      </div>

      <div class="diff-block">
        <h3>Last Diff</h3>
        ${diffHtml}
      </div>

      <div class="diff-block" style="margin-top:12px">
        <h3>Watch Path</h3>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text)">${escHtml(watcher.watchPath || '—')}</div>
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderWorkspace() {
  const dirs = status.workspace.allowedDirs || [];
  const git = status.git;
  const bridge = status.bridge || {};
  const caps = bridge.capabilities || {};

  document.getElementById('pane-workspace').innerHTML = `
    <div class="ws-panel">
      <div class="section-title">Allowed Directories</div>
      ${dirs.map(d => `<div class="dir-row">📁 ${d}</div>`).join('') || '<div class="empty">No directories configured</div>'}

      <div class="git-block">
        <h3>⚡ Studio One Bridge</h3>
        <div class="git-row"><span class="git-key">Enabled</span><span class="git-val">${bridge.enabled ? 'Yes' : 'No'}</span></div>
        <div class="git-row"><span class="git-key">Experimental</span><span class="git-val">${bridge.experimental ? 'Yes' : 'No'}</span></div>
        <div class="git-row"><span class="git-key">State</span><span class="git-val">${bridge.connectionState || bridge.status || '—'}</span></div>
        <div class="git-row"><span class="git-key">Lifecycle</span><span class="git-val">${bridge.lifecyclePhase || '—'}</span></div>
        <div class="git-row"><span class="git-key">Handshake</span><span class="git-val">${bridge.handshakeOk ? 'Complete' : 'Not verified'}</span></div>
        <div class="git-row"><span class="git-key">Extension ping OK</span><span class="git-val">${formatIso(bridge.extensionRespondedAt)}</span></div>
        <div class="git-row"><span class="git-key">Last handshake</span><span class="git-val">${formatIso(bridge.lastHandshakeAt)}</span></div>
        <div class="git-row"><span class="git-key">Last ping</span><span class="git-val">${formatIso(bridge.lastPingAt)}</span></div>
        <div class="git-row"><span class="git-key">Live read verified</span><span class="git-val">${formatIso(bridge.runtimeReadVerifiedAt)}</span></div>
        <div class="git-row"><span class="git-key">Live write verified</span><span class="git-val">${formatIso(bridge.runtimeWriteVerifiedAt)}</span></div>
        <div class="git-row"><span class="git-key">Capabilities</span><span class="git-val">${Object.entries(caps).filter(([,v]) => v).map(([k]) => k).join(', ') || 'None reported'}</span></div>
        ${bridge.lastError ? `<div class="git-row"><span class="git-key">Last error</span><span class="git-val ok-no">${bridge.lastError.code}: ${bridge.lastError.message}</span></div>` : ''}
        ${bridge.proof ? `
        <div class="git-row" style="margin-top:8px"><span class="git-key" style="width:140px;color:var(--text);font-weight:600">Proof states</span><span class="git-val"></span></div>
        <div class="git-row"><span class="git-key" style="width:140px">Package mode</span><span class="git-val">${bridge.proof.packageMode}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">Next required</span><span class="git-val">${bridge.proof.nextRequiredState || 'none (runtime verified)'}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">extensionLoaded</span><span class="git-val ${bridge.proof.extensionLoaded?'ok-yes':'ok-no'}">${bridge.proof.extensionLoaded?'✓':'✗'}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">listenerCreated</span><span class="git-val ${bridge.proof.listenerCreated?'ok-yes':'ok-no'}">${bridge.proof.listenerCreated?'✓':'✗'}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">handshakeOk</span><span class="git-val ${bridge.proof.handshakeOk?'ok-yes':'ok-no'}">${bridge.proof.handshakeOk?'✓':'✗'}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">liveReadVerified</span><span class="git-val ${bridge.proof.liveReadVerified?'ok-yes':'ok-no'}">${bridge.proof.liveReadVerified?'✓':'✗'}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">liveWriteVerified</span><span class="git-val ${bridge.proof.liveWriteVerified?'ok-yes':'ok-no'}">${bridge.proof.liveWriteVerified?'✓':'✗'}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">runtimeVerified</span><span class="git-val ${bridge.proof.runtimeVerified?'ok-yes':'ok-no'}">${bridge.proof.runtimeVerified?'✓':'✗'}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">Summary</span><span class="git-val" style="font-size:10px;color:var(--muted)">${bridge.proof.acceptanceSummary}</span></div>
        ` : ''}
        ${bridge.extensionEvidence && bridge.extensionEvidence.source !== 'none' ? `
        <div class="git-row" style="margin-top:8px"><span class="git-key" style="width:140px;color:var(--text);font-weight:600">Extension evidence</span><span class="git-val"></span></div>
        <div class="git-row"><span class="git-key" style="width:140px">Startup marker</span><span class="git-val ${bridge.extensionEvidence.startupMarkerFound?'ok-yes':'ok-no'}">${bridge.extensionEvidence.startupMarkerFound?'✓ Found':'✗ Not found'}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">Last startup</span><span class="git-val">${formatIso(bridge.extensionEvidence.lastStartupAt)}</span></div>
        <div class="git-row"><span class="git-key" style="width:140px">Filesystem write</span><span class="git-val">${bridge.extensionEvidence.filesystemWriteAvailable === true ? '✓' : bridge.extensionEvidence.filesystemWriteAvailable === false ? '✗' : '—'}</span></div>
        ` : ''}
      </div>

      <div class="git-block" style="margin-top:12px">
        <h3>⎇ Git Status</h3>
        ${git ? `
          <div class="git-row"><span class="git-key">Branch</span><span class="git-val">${git.branch}</span></div>
          <div class="git-row"><span class="git-key">Clean</span><span class="git-val ${git.clean?'ok-yes':'ok-no'}">${git.clean?'Yes':'No'}</span></div>
          ${git.modified.length ? `<div class="git-row"><span class="git-key">Modified</span><span class="git-val">${git.modified.join(', ')}</span></div>` : ''}
          ${git.staged.length ? `<div class="git-row"><span class="git-key">Staged</span><span class="git-val">${git.staged.join(', ')}</span></div>` : ''}
          ${git.untracked.length ? `<div class="git-row"><span class="git-key">Untracked</span><span class="git-val">${git.untracked.length} files</span></div>` : ''}
        ` : '<div style="color:var(--muted);font-size:12px">Git unavailable</div>'}
      </div>

      <div class="git-block" style="margin-top:12px">
        <h3>⚙ Config</h3>
        <div class="git-row"><span class="git-key">Dry-run</span><span class="git-val">${status.workspace.dryRunByDefault?'Yes (default)':'No'}</span></div>
        <div class="git-row"><span class="git-key">Version</span><span class="git-val">${status.server.version}</span></div>
      </div>
    </div>`;
}

// ── Auto-refresh ───────────────────────────────────────────────────────────────
fetchAll();
// Normal refresh every 5s; MCU tab refreshes faster (2s) for live VU/fader data
setInterval(() => {
  const mcuActive = document.querySelector('.tab.active')?.dataset.tab === 'mcu';
  fetchAll();
}, 3000);
</script>
</body>
</html>
