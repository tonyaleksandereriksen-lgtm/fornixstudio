<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornix Studio MCP — Dashboard</title>
<style>
  :root {
    --bg:       #0d0f14;
    --bg2:      #151820;
    --bg3:      #1c2030;
    --border:   #252a3a;
    --text:     #c8d0e8;
    --muted:    #5a6080;
    --accent:   #e05a00;
    --accent2:  #0066cc;
    --green:    #22cc66;
    --red:      #cc2222;
    --yellow:   #ccaa00;
    --purple:   #9966ff;
    --mono:     'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    --sans:     'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    min-height: 100vh;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: #fff;
  }
  .logo span { color: var(--accent); }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .pill-green  { background: #0d2a1a; color: var(--green);  border: 1px solid #1a5533; }
  .pill-red    { background: #2a0d0d; color: var(--red);    border: 1px solid #551a1a; }
  .pill-yellow { background: #2a2200; color: var(--yellow); border: 1px solid #554400; }

  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .dot-red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
  .dot-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

  .spacer { flex: 1; }

  #refresh-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--sans);
    transition: background 0.15s;
  }
  #refresh-btn:hover { background: var(--border); }

  .uptime { color: var(--muted); font-size: 12px; font-family: var(--mono); }

  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 53px);
  }

  /* ── Sidebar ──────────────────────────────────────────────────────────────── */
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    grid-row: 1 / 3;
    padding: 16px 0;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 16px 8px;
    margin-top: 8px;
  }

  .stat-block {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 700; color: #fff; font-family: var(--mono); }
  .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .family-list { padding: 0 8px; }
  .family-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .family-row:hover { background: var(--bg3); }
  .family-row.active { background: var(--bg3); border-left: 3px solid var(--accent); padding-left: 5px; }
  .family-name { font-size: 12px; color: var(--text); }
  .family-count {
    background: var(--bg3);
    color: var(--muted);
    font-size: 10px;
    font-family: var(--mono);
    padding: 1px 6px;
    border-radius: 999px;
  }

  /* ── Content area ─────────────────────────────────────────────────────────── */
  .content-top {
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    flex: 1;
    min-width: 160px;
  }
  .card-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
  .card-value { font-size: 24px; font-weight: 700; font-family: var(--mono); color: #fff; }
  .card-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .card.accent  { border-color: #e05a0044; background: #180f08; }
  .card.accent .card-value { color: var(--accent); }
  .card.bridge-ok   { border-color: #22cc6633; background: #081a10; }
  .card.bridge-ok .card-value { color: var(--green); }
  .card.bridge-off  { border-color: #cc222233; background: #1a0808; }
  .card.bridge-off .card-value { color: var(--red); }

  /* ── Log ──────────────────────────────────────────────────────────────────── */
  .log-area {
    overflow-y: auto;
    padding: 0 20px 20px;
  }

  .log-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0 8px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .log-header h2 { font-size: 13px; font-weight: 600; color: #fff; }

  .filter-row { display: flex; gap: 6px; }
  .filter-btn {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.1s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  tbody tr {
    border-bottom: 1px solid #ffffff08;
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--bg2); }
  tbody td {
    padding: 7px 8px;
    font-family: var(--mono);
    font-size: 11px;
    vertical-align: top;
  }

  .ok-yes { color: var(--green); }
  .ok-no  { color: var(--red);   }
  .dry    { color: var(--yellow); }

  .tool-tag {
    display: inline-block;
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    color: var(--muted);
  }

  .ts-cell { color: var(--muted); white-space: nowrap; }
  .summary-cell { color: var(--text); }
  .error-cell { color: var(--red); font-size: 10px; }

  /* ── Tools panel ──────────────────────────────────────────────────────────── */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    padding: 16px 20px;
  }

  .tool-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color 0.1s;
  }
  .tool-card:hover { border-color: var(--accent); }
  .tool-name { font-family: var(--mono); font-size: 11px; color: #fff; margin-bottom: 4px; }
  .tool-family { font-size: 10px; color: var(--muted); }
  .tool-rw {
    float: right;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--mono);
  }
  .tool-rw.ro { background: #1a3a22; color: var(--green); }
  .tool-rw.rw { background: #2a1a0a; color: var(--accent); }

  /* ── Workspace panel ──────────────────────────────────────────────────────── */
  .ws-panel { padding: 20px; }
  .dir-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .dir-row span { color: var(--muted); font-size: 11px; }

  .git-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 16px;
  }
  .git-block h3 { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .git-row { display: flex; gap: 10px; margin-bottom: 6px; font-size: 12px; }
  .git-key { color: var(--muted); width: 80px; flex-shrink: 0; }
  .git-val { font-family: var(--mono); color: var(--text); }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    padding: 0 20px;
  }
  .tab {
    padding: 10px 16px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: #fff; border-bottom-color: var(--accent); }

  #tab-content { overflow-y: auto; height: 100%; }

  .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    display: inline-block;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Fornix <span>Studio</span> MCP</div>
  <div id="bridge-pill" class="pill pill-yellow"><div class="dot dot-yellow"></div> Connecting…</div>
  <div class="uptime" id="uptime-label">—</div>
  <div class="spacer"></div>
  <span class="uptime" style="margin-right:8px"><span class="live-dot"></span> live</span>
  <button id="refresh-btn" onclick="fetchAll()">↻ Refresh</button>
</header>

<main>
  <aside>
    <div class="section-title">Overview</div>
    <div class="stat-block">
      <div class="stat-label">Tool calls this session</div>
      <div class="stat-value" id="stat-calls">—</div>
      <div class="stat-sub" id="stat-dirs">—</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">Git branch</div>
      <div class="stat-value" id="stat-branch" style="font-size:14px">—</div>
      <div class="stat-sub" id="stat-git-clean">—</div>
    </div>

    <div class="section-title" style="margin-top:12px">Tool Families</div>
    <div class="family-list" id="family-list"></div>
  </aside>

  <div style="display:flex;flex-direction:column;overflow:hidden;background:var(--bg)">
    <div class="content-top" id="cards"></div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="log">Action Log</div>
      <div class="tab" data-tab="tools">All Tools</div>
      <div class="tab" data-tab="workspace">Workspace</div>
    </div>

    <div id="tab-content">
      <div id="pane-log"></div>
      <div id="pane-tools" style="display:none"></div>
      <div id="pane-workspace" style="display:none"></div>
    </div>
  </div>
</main>

<script>
const API = 'http://localhost:7891/api';
let status = null;
let logData = [];
let toolData = [];
let logFilter = 'all';
let activeFamily = null;

// ── Tabs ───────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const name = tab.dataset.tab;
    ['log','tools','workspace'].forEach(p => {
      document.getElementById('pane-' + p).style.display = p === name ? '' : 'none';
    });
  });
});

// ── Fetch ──────────────────────────────────────────────────────────────────────
async function fetchAll() {
  try {
    const [s, l, t] = await Promise.all([
      fetch(API + '/status').then(r => r.json()),
      fetch(API + '/log?n=200').then(r => r.json()),
      fetch(API + '/tools').then(r => r.json()),
    ]);
    status = s; logData = l.entries; toolData = t.tools;
    render();
  } catch(e) {
    document.getElementById('bridge-pill').innerHTML = '<div class="dot dot-red"></div> MCP offline';
    document.getElementById('bridge-pill').className = 'pill pill-red';
  }
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  if (!status) return;
  renderHeader();
  renderCards();
  renderSidebar();
  renderLog();
  renderTools();
  renderWorkspace();
}

function renderHeader() {
  const bridge = status.bridge.status;
  const pill = document.getElementById('bridge-pill');
  if (bridge === 'connected') {
    pill.innerHTML = '<div class="dot dot-green"></div> S1 Bridge Connected';
    pill.className = 'pill pill-green';
  } else if (bridge === 'error') {
    pill.innerHTML = '<div class="dot dot-red"></div> Bridge Error';
    pill.className = 'pill pill-red';
  } else {
    pill.innerHTML = '<div class="dot dot-yellow"></div> S1 Disconnected';
    pill.className = 'pill pill-yellow';
  }

  const up = status.server.uptimeSeconds;
  const h = Math.floor(up / 3600), m = Math.floor((up % 3600) / 60), s = up % 60;
  document.getElementById('uptime-label').textContent =
    `Uptime ${h ? h+'h ' : ''}${m}m ${s}s`;
}

function renderCards() {
  const bridge = status.bridge.status;
  const bridgeClass = bridge === 'connected' ? 'bridge-ok' : 'bridge-off';
  const bridgeLabel = bridge === 'connected' ? 'Connected' : bridge;

  document.getElementById('cards').innerHTML = `
    <div class="card accent">
      <div class="card-title">Tool Calls</div>
      <div class="card-value">${status.stats.toolCallsThisSession}</div>
      <div class="card-sub">this session</div>
    </div>
    <div class="card ${bridgeClass}">
      <div class="card-title">Studio One Bridge</div>
      <div class="card-value">${bridgeLabel}</div>
      <div class="card-sub">ws://127.0.0.1:7890</div>
    </div>
    <div class="card">
      <div class="card-title">Log Entries</div>
      <div class="card-value">${logData.length}</div>
      <div class="card-sub">in .fornix-mcp.log</div>
    </div>
    <div class="card">
      <div class="card-title">Tools Available</div>
      <div class="card-value">${toolData.length}</div>
      <div class="card-sub">across ${new Set(toolData.map(t=>t.family)).size} families</div>
    </div>
  `;
}

function renderSidebar() {
  const families = [...new Set(toolData.map(t => t.family))];
  const counts = {};
  toolData.forEach(t => counts[t.family] = (counts[t.family]||0)+1);

  document.getElementById('stat-calls').textContent = status.stats.toolCallsThisSession;
  document.getElementById('stat-dirs').textContent = (status.workspace.allowedDirs||[]).join(', ').slice(0,40)||'—';
  document.getElementById('stat-branch').textContent = status.git?.branch ?? '—';
  document.getElementById('stat-git-clean').textContent = status.git
    ? (status.git.clean ? '✓ Working tree clean' : `${status.git.modified.length} modified`)
    : 'Git unavailable';

  document.getElementById('family-list').innerHTML = families.map(f => `
    <div class="family-row ${activeFamily===f?'active':''}" onclick="filterFamily('${f}')">
      <span class="family-name">${f}</span>
      <span class="family-count">${counts[f]}</span>
    </div>
  `).join('');
}

function filterFamily(f) {
  activeFamily = activeFamily === f ? null : f;
  renderSidebar();
  renderTools();
  // Switch to tools tab
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === 'tools');
  });
  ['log','tools','workspace'].forEach(p => {
    document.getElementById('pane-' + p).style.display = p === 'tools' ? '' : 'none';
  });
}

function renderLog() {
  const filtered = logFilter === 'all' ? logData
    : logFilter === 'errors' ? logData.filter(e => !e.ok)
    : logFilter === 'writes' ? logData.filter(e => e.action !== 'read')
    : logData.filter(e => e.action === 'read');

  if (!filtered.length) {
    document.getElementById('pane-log').innerHTML = `
      <div class="log-header" style="padding:12px 20px">
        ${logFilterButtons()}
      </div>
      <div class="empty">No log entries yet. Use Claude to run tools and they'll appear here.</div>`;
    return;
  }

  const rows = filtered.map(e => {
    const ts = new Date(e.ts).toLocaleTimeString();
    const ok = e.ok ? '<span class="ok-yes">✓</span>' : '<span class="ok-no">✗</span>';
    const dry = e.dryRun ? ' <span class="dry">[dry]</span>' : '';
    return `<tr>
      <td class="ts-cell">${ts}</td>
      <td>${ok}${dry}</td>
      <td><span class="tool-tag">${e.tool}</span></td>
      <td class="summary-cell">${e.summary}${e.error ? `<br><span class="error-cell">${e.error}</span>` : ''}</td>
    </tr>`;
  }).join('');

  document.getElementById('pane-log').innerHTML = `
    <div class="log-header" style="padding:8px 20px">
      <h2>Action Log <span style="color:var(--muted);font-size:11px;font-weight:400">(${filtered.length} entries)</span></h2>
      ${logFilterButtons()}
    </div>
    <div style="padding:0 20px 20px">
    <table>
      <thead><tr><th>Time</th><th>OK</th><th>Tool</th><th>Summary</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  addFilterListeners();
}

function logFilterButtons() {
  return `<div class="filter-row">
    ${['all','errors','writes','reads'].map(f => `
      <button class="filter-btn ${logFilter===f?'active':''}" onclick="setLogFilter('${f}')">${f}</button>
    `).join('')}
  </div>`;
}

function addFilterListeners() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      logFilter = btn.textContent.trim().toLowerCase().replace(' ','');
      renderLog();
    });
  });
}

function setLogFilter(f) { logFilter = f; renderLog(); }

function renderTools() {
  const filtered = activeFamily ? toolData.filter(t => t.family === activeFamily) : toolData;
  document.getElementById('pane-tools').innerHTML = `
    <div class="tools-grid">
      ${filtered.map(t => `
        <div class="tool-card">
          <div>
            <span class="tool-rw ${t.readOnly?'ro':'rw'}">${t.readOnly?'read':'write'}</span>
          </div>
          <div class="tool-name">${t.name}</div>
          <div class="tool-family">${t.family}</div>
        </div>
      `).join('')}
    </div>`;
}

function renderWorkspace() {
  const dirs = status.workspace.allowedDirs || [];
  const git = status.git;

  document.getElementById('pane-workspace').innerHTML = `
    <div class="ws-panel">
      <div class="section-title">Allowed Directories</div>
      ${dirs.map(d => `<div class="dir-row">📁 ${d}</div>`).join('') || '<div class="empty">No directories configured</div>'}

      <div class="git-block">
        <h3>⎇ Git Status</h3>
        ${git ? `
          <div class="git-row"><span class="git-key">Branch</span><span class="git-val">${git.branch}</span></div>
          <div class="git-row"><span class="git-key">Clean</span><span class="git-val ${git.clean?'ok-yes':'ok-no'}">${git.clean?'Yes':'No'}</span></div>
          ${git.modified.length ? `<div class="git-row"><span class="git-key">Modified</span><span class="git-val">${git.modified.join(', ')}</span></div>` : ''}
          ${git.staged.length ? `<div class="git-row"><span class="git-key">Staged</span><span class="git-val">${git.staged.join(', ')}</span></div>` : ''}
          ${git.untracked.length ? `<div class="git-row"><span class="git-key">Untracked</span><span class="git-val">${git.untracked.length} files</span></div>` : ''}
        ` : '<div style="color:var(--muted);font-size:12px">Git unavailable</div>'}
      </div>

      <div class="git-block" style="margin-top:12px">
        <h3>⚙ Config</h3>
        <div class="git-row"><span class="git-key">Dry-run</span><span class="git-val">${status.workspace.dryRunByDefault?'Yes (default)':'No'}</span></div>
        <div class="git-row"><span class="git-key">Version</span><span class="git-val">${status.server.version}</span></div>
      </div>
    </div>`;
}

// ── Auto-refresh ───────────────────────────────────────────────────────────────
fetchAll();
setInterval(fetchAll, 8000);
</script>
</body>
</html>
